<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MP3 Audio Merger Online</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:900px;
      background:#1e293b;
      border-radius:20px;
      padding:30px;
      box-shadow:0 10px 40px rgba(0,0,0,0.4);
    }

    h1{
      font-size:32px;
      margin-bottom:10px;
      text-align:center;
    }

    p{
      text-align:center;
      color:#cbd5e1;
      margin-bottom:25px;
    }

    .upload-box{
      border:2px dashed #475569;
      padding:40px;
      text-align:center;
      border-radius:15px;
      background:#0f172a;
      transition:0.3s;
    }

    .upload-box:hover{
      border-color:#38bdf8;
    }

    input[type=file]{
      margin-top:15px;
      color:white;
    }

    .file-list{
      margin-top:25px;
    }

    .file-item{
      background:#334155;
      padding:12px 15px;
      border-radius:10px;
      margin-bottom:10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    button{
      border:none;
      padding:14px 22px;
      border-radius:12px;
      cursor:pointer;
      font-size:16px;
      font-weight:bold;
      transition:0.3s;
    }

    .merge-btn{
      width:100%;
      margin-top:25px;
      background:#38bdf8;
      color:#0f172a;
    }

    .merge-btn:hover{
      background:#0ea5e9;
    }

    .download-btn{
      background:#22c55e;
      color:white;
      display:none;
      margin-top:20px;
      width:100%;
    }

    .download-btn:hover{
      background:#16a34a;
    }

    audio{
      width:100%;
      margin-top:10px;
    }

    .footer{
      text-align:center;
      margin-top:25px;
      color:#94a3b8;
      font-size:14px;
    }

    .loading{
      text-align:center;
      margin-top:20px;
      color:#38bdf8;
      display:none;
    }
  </style>
</head>
<body>

<div class="container">

  <h1>MP3 Audio Merger</h1>

  <p>
    Gabungkan beberapa file MP3 menjadi satu audio langsung di browser.
  </p>

  <div class="upload-box">
    <h2>Upload File MP3</h2>

    <input type="file" id="audioInput" accept="audio/mp3,audio/*" multiple>
  </div>

  <div class="file-list" id="fileList"></div>

  <button class="merge-btn" id="mergeBtn">
    Gabungkan Audio
  </button>

  <div class="loading" id="loading">
    Sedang menggabungkan audio...
  </div>

  <a id="downloadLink" download="merged-audio.wav">
    <button class="download-btn" id="downloadBtn">
      Download Audio Gabungan
    </button>
  </a>

  <div class="footer">
    Dibuat dengan HTML + JavaScript • Cocok untuk GitHub Pages
  </div>

</div>

<script>
  const audioInput = document.getElementById("audioInput");
  const fileList = document.getElementById("fileList");
  const mergeBtn = document.getElementById("mergeBtn");
  const loading = document.getElementById("loading");
  const downloadBtn = document.getElementById("downloadBtn");
  const downloadLink = document.getElementById("downloadLink");

  let selectedFiles = [];

  audioInput.addEventListener("change", (e) => {
    selectedFiles = [...e.target.files];

    renderFiles();
  });

  function renderFiles(){
    fileList.innerHTML = "";

    selectedFiles.forEach((file, index) => {

      const div = document.createElement("div");
      div.className = "file-item";

      div.innerHTML = `
        <span>${index + 1}. ${file.name}</span>
      `;

      fileList.appendChild(div);
    });
  }

  mergeBtn.addEventListener("click", async () => {

    if(selectedFiles.length < 2){
      alert("Upload minimal 2 file audio.");
      return;
    }

    loading.style.display = "block";

    const audioContext = new (window.AudioContext || window.webkitAudioContext)();

    let audioBuffers = [];

    for(const file of selectedFiles){

      const arrayBuffer = await file.arrayBuffer();

      const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

      audioBuffers.push(audioBuffer);
    }

    const numberOfChannels = 2;

    const sampleRate = audioBuffers[0].sampleRate;

    let totalLength = 0;

    audioBuffers.forEach(buffer => {
      totalLength += buffer.length;
    });

    const outputBuffer = audioContext.createBuffer(
      numberOfChannels,
      totalLength,
      sampleRate
    );

    let offset = 0;

    audioBuffers.forEach(buffer => {

      for(let channel = 0; channel < numberOfChannels; channel++){

        const outputData = outputBuffer.getChannelData(channel);

        const inputData = buffer.getChannelData(
          Math.min(channel, buffer.numberOfChannels - 1)
        );

        outputData.set(inputData, offset);
      }

      offset += buffer.length;
    });

    const wavBlob = bufferToWave(outputBuffer, totalLength);

    const url = URL.createObjectURL(wavBlob);

    downloadLink.href = url;

    loading.style.display = "none";

    downloadBtn.style.display = "block";
  });

  function bufferToWave(abuffer, len) {

    const numOfChan = abuffer.numberOfChannels,
      length = len * numOfChan * 2 + 44,
      buffer = new ArrayBuffer(length),
      view = new DataView(buffer),
      channels = [],
      sampleRate = abuffer.sampleRate;

    let offset = 0;
    let pos = 0;

    setUint32(0x46464952);
    setUint32(length - 8);
    setUint32(0x45564157);

    setUint32(0x20746d66);
    setUint32(16);
    setUint16(1);
    setUint16(numOfChan);
    setUint32(sampleRate);
    setUint32(sampleRate * 2 * numOfChan);
    setUint16(numOfChan * 2);
    setUint16(16);

    setUint32(0x61746164);
    setUint32(length - pos - 4);

    for(let i = 0; i < abuffer.numberOfChannels; i++)
      channels.push(abuffer.getChannelData(i));

    while(pos < length){

      for(let i = 0; i < numOfChan; i++){

        let sample = Math.max(-1, Math.min(1, channels[i][offset]));

        sample = sample < 0
          ? sample * 0x8000
          : sample * 0x7FFF;

        view.setInt16(pos, sample, true);

        pos += 2;
      }

      offset++;
    }

    function setUint16(data){
      view.setUint16(pos, data, true);
      pos += 2;
    }

    function setUint32(data){
      view.setUint32(pos, data, true);
      pos += 4;
    }

    return new Blob([buffer], { type: "audio/wav" });
  }
</script>

</body>
</html>
